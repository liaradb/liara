# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Liara

on:
  push:
    branches: ["main"]
    paths:
      - .github/workflows/liara.yml
      - modules/eventsource_go/**
      - modules/liara/**
  pull_request:
    branches: ["main"]
    paths:
      - .github/workflows/liara.yml
      - modules/eventsource_go/**
      - modules/liara/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: services/liaradb/go.mod
          cache-dependency-path: |
            modules/eventsource_go/go.sum
            modules/liara/go.sum

      - name: Build Liara
        working-directory: ./modules/liara
        run: go build -v ./...

      - name: Test Liara
        working-directory: ./modules/liara
        run: go test -v ./...
