# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Liara

on:
  push:
    branches: [ "main" ]
    paths:
      - .github/workflows/liara.yml
      - modules/liara/**
      - modules/liaractl/**
      - services/liarasql/**
  pull_request:
    branches: [ "main" ]
    paths:
      - .github/workflows/liara.yml
      - modules/liara/**
      - modules/liaractl/**
      - services/liarasql/**

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: services/liarasql/go.mod
        cache-dependency-path: |
          modules/liara/go.sum
          modules/liaractl/go.sum
          services/liarasql/go.sum

    - name: Build Liara
      working-directory: ./modules/liara
      run: go build -v ./...

    - name: Build LiaraCtl
      working-directory: ./modules/liaractl
      run: go build -v ./...

    - name: Build LiaraService
      working-directory: ./services/liarasql
      run: go build -v ./...

    - name: Test Liara
      working-directory: ./modules/liara
      run: go test -v ./...

    - name: Test LiaraCtl
      working-directory: ./modules/liaractl
      run: go test -v ./...

    - name: Test LiaraService
      working-directory: ./services/liarasql
      run: go test -v ./...
